<!DOCTYPE html>
<html>
<head>
<title>For Mariyam ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  overflow: hidden;
  color: white;
}

/* LOCK */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

/* SLIDES */
.slide {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 20px;
  text-align: center;
  opacity: 0;
  transform: scale(1.1);
  transition: 1s;
}

.active {
  opacity: 1;
  transform: scale(1);
}

/* COLORS */
.slide:nth-child(2){background:linear-gradient(135deg,#ff758c,#ff7eb3);}
.slide:nth-child(3){background:linear-gradient(135deg,#ff7eb3,#ff758c);}
.slide:nth-child(4){background:linear-gradient(135deg,#ff6a88,#ff99ac);}
.slide:nth-child(5){background:linear-gradient(135deg,#ff8fa3,#ff758c);}

/* TEXT */
h1 {font-family:'Great Vibes'; font-size:50px;}
.name {text-shadow:0 0 20px white,0 0 60px #ff4b7d;}
p {
  max-width:800px;
  background:rgba(255,255,255,0.2);
  padding:20px;
  border-radius:20px;
}

/* BUTTON */
button {
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff4b7d;
  font-weight:bold;
}

/* HEARTS */
.float {
  position:fixed;
  font-size:18px;
  animation:floatUp linear infinite;
}
@keyframes floatUp {
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div id="lockScreen">
  <h2>Enter Secret Code 💖</h2>
  <input type="password" id="pass">
  <button onclick="check()">Unlock</button>
</div>

<div class="slide active">
  <h1>Happy Birthday <span class="name">Mariyam</span></h1>
  <button onclick="start()">Start</button>
</div>

<div class="slide"><p id="t1"></p></div>
<div class="slide"><p id="t2"></p></div>
<div class="slide"><p id="t3"></p></div>

<script>
const correctPassword="maryani";

function check(){
  if(pass.value===correctPassword){
    lockScreen.style.display="none";
  } else alert("Wrong password");
}

let slides=document.querySelectorAll(".slide");
let current=0;

function show(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function type(id,text,speed,callback){
  let i=0;
  function typing(){
    if(i<text.length){
      document.getElementById(id).innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    } else if(callback) callback();
  }
  typing();
}

function start(){
  bgMusic.play();
  nextSlide();
}

function nextSlide(){
  current++;
  show(current);

  if(current===1){
    type("t1","First of all Happy Birthday Mariyam today is a very special day...",20,()=>setTimeout(nextSlide,2000));
  }

  else if(current===2){
    type("t2","sorry woh card toh nhi hai abb mere pass but still...",20,()=>setTimeout(nextSlide,2000));
  }

  else if(current===3){
    type("t3","i want to say thank u yaar... Happy Birthday my love ❤️",20);
  }
}

/* hearts */
setInterval(()=>{
  let el=document.createElement("div");
  el.className="float";
  el.innerHTML="❤️";
  el.style.left=Math.random()*100+"vw";
  el.style.animationDuration=(4+Math.random()*3)+"s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),7000);
},400);
</script>

</body>
</html>
