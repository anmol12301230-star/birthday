<!DOCTYPE html>
<html>
<head>
<title>For Mariyam ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  overflow: hidden;
  color: white;
}

/* LOCK SCREEN */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

/* SLIDES */
.slide {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 20px;
  text-align: center;
  opacity: 0;
  transform: scale(1.1);
  transition: all 1s ease;
}

.active {
  opacity: 1;
  transform: scale(1);
}

/* BACKGROUNDS */
.slide:nth-child(2) { background: linear-gradient(135deg, #ff758c, #ff7eb3); }
.slide:nth-child(3) { background: linear-gradient(135deg, #ff7eb3, #ff758c); }
.slide:nth-child(4) { background: linear-gradient(135deg, #ff6a88, #ff99ac); }
.slide:nth-child(5) { background: linear-gradient(135deg, #ff8fa3, #ff758c); }

/* HEADING */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 50px;
}

.name {
  text-shadow: 0 0 20px white, 0 0 60px #ff4b7d;
}

/* TEXT */
p {
  max-width: 850px;
  line-height: 1.8;
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 30px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4b7d;
  font-weight: bold;
  cursor: pointer;
}

/* FLOAT HEARTS */
.float {
  position: fixed;
  font-size: 18px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* SPARKLES */
.sparkle {
  position: fixed;
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  animation: sparkle 2s infinite;
}

@keyframes sparkle {
  0% { opacity: 0; }
  50% { opacity: 1; }
  100% { opacity: 0; }
}

/* BURST */
.burst {
  position: fixed;
  animation: burst 1s forwards;
}

@keyframes burst {
  to {
    transform: translate(80px, -100px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- 🎶 MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<!-- LOCK -->
<div id="lockScreen">
  <h2>Enter Secret Code 💖</h2>
  <input type="password" id="pass">
  <button onclick="check()">Unlock</button>
</div>

<!-- SLIDES -->
<div class="slide active">
  <h1>Happy Birthday <span class="name">Mariyam</span> 🎉</h1>
  <button onclick="startStory()">Start</button>
</div>

<div class="slide"><p id="text1"></p></div>
<div class="slide"><p id="text2"></p></div>
<div class="slide"><p id="text3"></p></div>

<script>
const correctPassword = "maryani";

function check() {
  if (document.getElementById("pass").value === correctPassword) {
    document.getElementById("lockScreen").style.display = "none";
  } else {
    alert("Wrong password 💔");
  }
}

let current = 0;
let slides = document.querySelectorAll(".slide");

function showSlide(i) {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function startStory() {
  document.getElementById("bgMusic").play(); // 🎶 MUSIC START
  nextSlide();
  setTimeout(nextSlide, 7000);
  setTimeout(nextSlide, 14000);
}

function nextSlide() {
  if (current < slides.length - 1) {
    current++;
    showSlide(current);
  }
}

// typing
function typeText(id, text, speed=20){
  let i=0;
  function typing(){
    if(i<text.length){
      document.getElementById(id).innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}

typeText("text1","First of all Happy Birthday Mariyam...");
typeText("text2","sorry woh card toh nhi hai abb mere pass...");
typeText("text3","i want to say thank u yaar... Happy Birthday my love ❤️");

// effects
setInterval(()=>{
  let el=document.createElement("div");
  el.className="float";
  el.innerHTML="❤️";
  el.style.left=Math.random()*100+"vw";
  el.style.animationDuration=(4+Math.random()*3)+"s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),7000);
},400);

setInterval(()=>{
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),2000);
},200);

document.addEventListener("click",e=>{
  for(let i=0;i<6;i++){
    let h=document.createElement("div");
    h.className="burst";
    h.innerHTML="❤️";
    h.style.left=e.clientX+"px";
    h.style.top=e.clientY+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
});
</script>

</body>
</html>
